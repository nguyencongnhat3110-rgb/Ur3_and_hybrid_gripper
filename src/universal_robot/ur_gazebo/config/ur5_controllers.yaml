joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: &loop_hz 125

eff_joint_traj_controller:
  type: effort_controllers/JointTrajectoryController
  joints: &robot_joints
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint
  gains: # Required because we're controlling an effort interface
    shoulder_pan_joint: {p: 4000,  d: 200, i: 1, i_clamp: 1}
    shoulder_lift_joint: {p: 10000,  d: 200, i: 1, i_clamp: 1}
    elbow_joint: {p: 2000,  d: 20, i: 1, i_clamp: 1}
    wrist_1_joint: {p: 500,  d: 1, i: 1, i_clamp: 1}
    wrist_2_joint: {p: 500,  d: 1, i: 1, i_clamp: 1}
    wrist_3_joint: {p: 10,  d: 0.1, i: 0, i_clamp: 1} 
  constraints:
    # 1. Tăng thời gian mục tiêu (giảm tốc độ thực thi)
    goal_time: 2.0  # Tăng từ 0.6 lên 2.0 giây
    stopped_velocity_tolerance: 0.05
    
    # 2. Nới lỏng dung sai quỹ đạo (khắc phục lỗi PATH_TOLERANCE_VIOLATED)
    # Tăng từ 0.1 lên 0.3 radian (khoảng 17 độ) cho các khớp lớn hay bị lỗi.
    shoulder_pan_joint: {trajectory: 0.3, goal: 0.1}
    shoulder_lift_joint: {trajectory: 0.3, goal: 0.1} 
    elbow_joint: {trajectory: 0.3, goal: 0.1}
    # Giữ nguyên các khớp cổ tay vì chúng ít bị lỗi PATH_TOLERANCE hơn.
    wrist_1_joint: {trajectory: 0.1, goal: 0.1}
    wrist_2_joint: {trajectory: 0.1, goal: 0.1}
    wrist_3_joint: {trajectory: 0.1, goal: 0.1}
    
  stop_trajectory_duration: 0.5
  state_publish_rate: *loop_hz
  action_monitor_rate: 10

joint_group_eff_controller:
  type: effort_controllers/JointGroupEffortController
  joints: *robot_joints

pos_joint_traj_controller:
  type: position_controllers/JointTrajectoryController
  joints: *robot_joints
  constraints:
    # Điều chỉnh goal_time và trajectory tolerance cho controller vị trí nếu bạn sử dụng nó.
    goal_time: 2.0 # Tăng từ 0.6 lên 2.0 giây
    stopped_velocity_tolerance: 0.05
    shoulder_pan_joint: {trajectory: 0.3, goal: 0.05}
    shoulder_lift_joint: {trajectory: 0.3, goal: 0.1}
    elbow_joint: {trajectory: 0.3, goal: 0.1}
    wrist_1_joint: {trajectory: 0.1, goal: 0.1}
    wrist_2_joint: {trajectory: 0.1, goal: 0.1}
    wrist_3_joint: {trajectory: 0.1, goal: 0.1}
  stop_trajectory_duration: 0.5
  state_publish_rate: *loop_hz
  action_monitor_rate: 10

joint_group_pos_controller:
  type: position_controllers/JointGroupPositionController
  joints: *robot_joints
  # Thêm đoạn này vào cuối file ur5_controllers.yaml
scaled_pos_joint_traj_controller:
  type: position_controllers/JointTrajectoryController
  joints: *robot_joints
  constraints:
    goal_time: 2.0
    stopped_velocity_tolerance: 0.05
    # Nới lỏng dung sai cho các khớp hay bị lỗi
    shoulder_pan_joint: {trajectory: 0.2, goal: 0.1}
    shoulder_lift_joint: {trajectory: 0.2, goal: 0.1}
    elbow_joint: {trajectory: 0.2, goal: 0.1}
    wrist_1_joint: {trajectory: 0.1, goal: 0.1}
    wrist_2_joint: {trajectory: 0.1, goal: 0.1}
    wrist_3_joint: {trajectory: 0.1, goal: 0.1}
  stop_trajectory_duration: 0.5
  state_publish_rate: *loop_hz
  action_monitor_rate: 10